<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c8651a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Training">
<title>Programma — Farina Vincenzo</title>
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --card2: #f0ede8;
    --border: #e0ddd8;
    --border2: #ccc9c2;
    --text: #1a1916;
    --text2: #5a5752;
    --text3: #9a9590;
    --accent: #c8651a;
    --accent-bg: #fff3eb;
    --accent-text: #9e4a0e;
    --blue-bg: #ebf2fc;
    --blue-text: #1a5ca0;
    --red-bg: #fceaea;
    --red-text: #a02020;
    --purple-bg: #f0eefe;
    --purple-text: #4a38b0;
    --green-bg: #e8f5e0;
    --green-text: #2e7020;
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412;
      --card: #1e1c18;
      --card2: #252320;
      --border: #2e2c28;
      --border2: #3e3c38;
      --text: #f0ede8;
      --text2: #a0998f;
      --text3: #6a6560;
      --accent: #e07830;
      --accent-bg: #2a1a08;
      --accent-text: #f0a060;
      --blue-bg: #0a1e38;
      --blue-text: #70a8e8;
      --red-bg: #280a0a;
      --red-text: #e08080;
      --purple-bg: #18103a;
      --purple-text: #a090e8;
      --green-bg: #0a1e08;
      --green-text: #80c870;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .app-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; position: sticky; top: 0; z-index: 100; }
  .app-header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .app-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .app-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Install button */
  .install-btn { flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 20px; border: 1.5px solid var(--accent); background: var(--accent-bg); color: var(--accent-text); cursor: pointer; white-space: nowrap; }
  .install-btn:active { opacity: .8; }

  /* Day tabs */
  .day-nav { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); scrollbar-width: none; }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-btn { flex-shrink: 0; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all .15s; }
  .day-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Content */
  .content { max-width: 680px; margin: 0 auto; padding: 16px; }

  /* Week strip */
  .week-strip { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
  .week-strip::-webkit-scrollbar { display: none; }
  .wk-btn { flex-shrink: 0; font-size: 12px; padding: 5px 12px; border-radius: 16px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; }
  .wk-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .week-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 18px; }
  .week-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .week-desc { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .week-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .ta { background: var(--accent-bg); color: var(--accent-text); }
  .tb { background: var(--blue-bg); color: var(--blue-text); }
  .tr { background: var(--red-bg); color: var(--red-text); }
  .tp { background: var(--purple-bg); color: var(--purple-text); }
  .tg { background: var(--green-bg); color: var(--green-text); }

  /* Section title */
  .sec { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin: 20px 0 10px; }

  /* Exercise card */
  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); margin-bottom: 10px; overflow: hidden; }
  .ex-header { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; }
  .ex-num { font-size: 11px; font-weight: 700; color: var(--text3); min-width: 24px; }
  .ex-name { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.3; }
  .ex-summary { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .ex-arrow { font-size: 12px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
  .ex-arrow.open { transform: rotate(180deg); }
  .ex-body { border-top: 1px solid var(--border); padding: 16px; display: none; }
  .ex-body.open { display: block; }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--card2); border-radius: var(--r-sm); padding: 9px 10px; }
  .stat-label { font-size: 10px; color: var(--text3); margin-bottom: 3px; font-weight: 500; }
  .stat-val { font-size: 14px; font-weight: 700; }

  /* TUT visual */
  .tut-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .04em; margin-bottom: 8px; }
  .tut-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }

  .tut-phase-name { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
  .tut-phase-sec { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1.2; }
  .tut-phase-sub { font-size: 10px; color: var(--text3); }
  .tut-arrow { font-size: 14px; color: var(--border2); flex-shrink: 0; }

  /* Note */
  .note { border-left: 3px solid var(--accent); background: var(--accent-bg); border-radius: 0 var(--r-sm) var(--r-sm) 0; padding: 9px 12px; font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }

  /* Alternative */
  .alt-box { background: var(--green-bg); border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 12px; }
  .alt-header { font-size: 10px; font-weight: 700; color: var(--green-text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .alt-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }

  /* Tips */
  .tips-box { background: var(--blue-bg); border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 12px; }
  .tips-header { font-size: 10px; font-weight: 700; color: var(--blue-text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .tips-list li { font-size: 13px; color: var(--text2); line-height: 1.5; padding-left: 16px; position: relative; }
  .tips-list li::before { content: "•"; position: absolute; left: 0; color: var(--blue-text); font-weight: 700; }

  /* Progression */
  .prog-title { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .prog-row { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .prog-row:last-child { border-bottom: none; }
  .prog-weeks { font-weight: 700; color: var(--text); min-width: 50px; flex-shrink: 0; }
  .prog-desc { color: var(--text2); line-height: 1.5; }

  /* Weight logger */
  .weight-section { margin-top: 16px; background: var(--card2); border-radius: var(--r-md); padding: 14px; }
  .weight-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .weight-title span { font-size: 16px; }
  .weight-sets { display: flex; flex-direction: column; gap: 8px; }
  .weight-set-row { display: flex; align-items: center; gap: 8px; }
  .set-label { font-size: 12px; font-weight: 600; color: var(--text3); min-width: 42px; }
  .weight-input { flex: 1; height: 38px; border: 1.5px solid var(--border2); border-radius: var(--r-sm); background: var(--card); color: var(--text); font-size: 15px; font-weight: 600; padding: 0 10px; text-align: center; outline: none; transition: border-color .15s; }
  .weight-input:focus { border-color: var(--accent); }
  .weight-unit { font-size: 12px; color: var(--text3); min-width: 20px; }
  .save-btn { width: 100%; margin-top: 12px; padding: 10px; background: var(--accent); color: white; border: none; border-radius: var(--r-sm); font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .save-btn:active { opacity: .8; }
  .saved-badge { display: none; font-size: 12px; color: var(--green-text); font-weight: 600; text-align: center; margin-top: 8px; }
  .saved-badge.show { display: block; }
  .note-input-wrap { margin-top: 10px; }
  .note-input { width: 100%; border: 1.5px solid var(--border2); border-radius: var(--r-sm); background: var(--card); color: var(--text); font-size: 13px; padding: 9px 12px; outline: none; resize: none; line-height: 1.5; transition: border-color .15s; }
  .note-input:focus { border-color: var(--accent); }

  /* Mobility card */
  .mob-list { padding: 4px 0; }
  .mob-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .mob-item:last-child { border-bottom: none; }
  .mob-name { color: var(--text); font-weight: 500; }
  .mob-right { display: flex; align-items: center; gap: 8px; }
  .mob-sets { color: var(--text3); font-size: 13px; }

  /* YouTube button */
  .yt-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: var(--r-sm); border: 1.5px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; transition: all .15s; text-decoration: none; }
  .yt-btn:hover, .yt-btn:active { background: var(--red-bg); color: var(--red-text); border-color: var(--red-text); }
  .yt-icon { font-size: 15px; }

  /* Buttons row */
  .btn-row { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }

  /* Superset / Giant Set — palestra occupata */
  .gs-tip-box { background: var(--purple-bg); border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 12px; }
  .gs-tip-header { font-size: 10px; font-weight: 700; color: var(--purple-text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .gs-tip-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .gs-tip-list li { font-size: 13px; color: var(--text2); line-height: 1.5; padding-left: 16px; position: relative; }
  .gs-tip-list li::before { content: "→"; position: absolute; left: 0; color: var(--purple-text); font-weight: 700; }

  /* Badge */
  .badge-gs { font-size: 10px; font-weight: 700; background: var(--purple-bg); color: var(--purple-text); padding: 2px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }

  /* Glossary */
  .glossary { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; margin-bottom: 30px; }
  .gl-row { display: flex; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .gl-row:last-child { border-bottom: none; }
  .gl-term { font-weight: 700; color: var(--text); min-width: 72px; flex-shrink: 0; }
  .gl-def { color: var(--text2); line-height: 1.5; }

  /* Day title */
  .day-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .day-sub { font-size: 13px; color: var(--text3); margin-bottom: 16px; }

  /* Day nav with dots */
  .day-btn-wrap { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
  .day-btn { width: 100%; }
  .day-dots { display: flex; gap: 3px; justify-content: center; }
  .day-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); transition: background .2s; }
  .day-dot.done { background: var(--accent); }
  .day-dot.today { background: var(--green-text); }

  /* Progress banner */
  .prog-banner { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 14px; }
  .prog-banner-icon { font-size: 28px; flex-shrink: 0; }
  .prog-banner-body { flex: 1; min-width: 0; }
  .prog-banner-week { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .prog-banner-detail { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .prog-banner-bar-wrap { margin-top: 8px; background: var(--card2); border-radius: 4px; height: 6px; overflow: hidden; }
  .prog-banner-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }

  /* Complete button */
  .complete-section { margin-top: 24px; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); }
  .complete-btn { width: 100%; padding: 14px; background: var(--green-text); color: white; border: none; border-radius: var(--r-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .15s; letter-spacing: -0.2px; }
  .complete-btn:active { opacity: .8; }
  .complete-btn.already { background: var(--card2); color: var(--green-text); border: 1.5px solid var(--green-text); }
  .complete-btn.undo { background: transparent; color: var(--text3); border: 1.5px solid var(--border2); font-size: 13px; margin-top: 8px; padding: 8px; }
  .complete-hint { font-size: 12px; color: var(--text3); margin-top: 8px; line-height: 1.5; }
  .complete-date-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .complete-date-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .complete-date-input { flex: 1; min-width: 130px; height: 36px; border: 1.5px solid var(--border2); border-radius: var(--r-sm); background: var(--card); color: var(--text); font-size: 14px; padding: 0 10px; outline: none; }
  .complete-date-input:focus { border-color: var(--accent); }
  .hist-date-edit { font-size: 12px; background: none; border: none; color: var(--blue-text); cursor: pointer; padding: 0 2px; text-decoration: underline; }
  .complete-history-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 8px; }
  .complete-history { display: flex; flex-direction: column; gap: 6px; }
  .hist-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 6px; }
  .hist-row:last-child { border-bottom: none; }
  .hist-week { font-weight: 700; color: var(--accent); min-width: 56px; }
  .hist-date { color: var(--text2); flex: 1; }
  .hist-ago { color: var(--text3); font-size: 12px; white-space: nowrap; }
  .hist-del { background: none; border: none; font-size: 15px; cursor: pointer; padding: 0 4px; color: var(--text3); flex-shrink: 0; }

  /* Week spotlight — questa settimana */
  .wk-spotlight { border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 12px; border: 1.5px solid var(--border); background: var(--card2); }
  .wk-spot-panel { }
  .wk-spot-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .wk-spot-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  .wk-spot-stat-row { display: flex; gap: 16px; margin-bottom: 8px; flex-wrap: wrap; }
  .wk-spot-stat { font-size: 13px; font-weight: 600; color: var(--text); }
  .wk-spot-stat span { color: var(--text3); font-weight: 400; margin-right: 4px; font-size: 12px; }
  .wk-spot-tech { font-size: 13px; color: var(--text2); line-height: 1.55; }

  /* Visual schemas */
  .schema-wrap { margin-top: 10px; }
  .schema-row { display: flex; align-items: center; gap: 5px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; }
  .schema-row::-webkit-scrollbar { display: none; }
  .schema-set { background: var(--card); border: 1.5px solid var(--border2); border-radius: var(--r-sm); padding: 6px 7px; text-align: center; min-width: 48px; flex-shrink: 0; }
  .schema-set-label { font-size: 9px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
  .schema-set-val { font-size: 11px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .schema-arrow { font-size: 12px; color: var(--border2); flex-shrink: 0; }
  .schema-bo { background: var(--accent-bg); border: 1.5px solid var(--accent); border-radius: var(--r-sm); padding: 6px 8px; text-align: center; min-width: 68px; flex-shrink: 0; }
  .schema-bo-label { font-size: 9px; color: var(--accent-text); font-weight: 700; text-transform: uppercase; }
  .schema-bo-val { font-size: 11px; font-weight: 700; color: var(--accent-text); margin-top: 2px; }
  .schema-pause { background: var(--red-bg); border: 1.5px solid var(--red-text); border-radius: var(--r-sm); padding: 6px 8px; text-align: center; min-width: 42px; flex-shrink: 0; }
  .schema-pause-label { font-size: 9px; color: var(--red-text); font-weight: 700; }
  .schema-pause-val { font-size: 14px; font-weight: 700; color: var(--red-text); }
  .schema-drop { background: var(--purple-bg); border: 1.5px solid var(--purple-text); border-radius: var(--r-sm); padding: 6px 8px; text-align: center; min-width: 56px; flex-shrink: 0; }
  .schema-drop-label { font-size: 9px; color: var(--purple-text); font-weight: 700; text-transform: uppercase; }
  .schema-drop-val { font-size: 11px; font-weight: 700; color: var(--purple-text); margin-top: 2px; }

  /* Giant Set alternative */
  .gsalt-box { background: var(--blue-bg); border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--blue-text); }
  .gsalt-header { font-size: 10px; font-weight: 700; color: var(--blue-text); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .gsalt-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .gsalt-meta { font-size: 12px; color: var(--blue-text); font-weight: 600; margin-bottom: 6px; }
  .gsalt-note { font-size: 12px; color: var(--text2); line-height: 1.55; margin-bottom: 8px; }
</style>
</head>

<div class="app-header">
  <div class="app-header-row">
    <div>
      <div class="app-title">Programma — Farina Vincenzo</div>
      <div class="app-meta">Split 4 giorni · 8/10 settimane · Start 07/04/2026</div>
    </div>
    <button class="install-btn" id="install-btn" onclick="showInstallInfo()">📲 App</button>
  </div>
</div>

<div class="day-nav" id="day-nav"></div>

<div class="content" id="content"></div>

<script>
const WEEKS = [
  {label:"W1–2 — Tensione meccanica", desc:"Focus sul tempo sotto tensione (TUT controllato). Superset e Giant Set di base. Isometria sugli esercizi di isolamento: tieni il picco di contrazione 2\" prima di tornare.", tags:[["TUT controllato","ta"],["RIR 2","tb"],["Superset / Giant Set","ta"],["Isometria","tg"]]},
  {label:"W3–4 — Intensificazione", desc:"Intensità aumentata con RIR 1. Aggiunta Back-Off set sugli esercizi di pompaggio: Chest Press, Lat Pulldown, Leg Extension. Scala il peso del 15-20% e fai 15-20 reps extra.", tags:[["RIR 1","tr"],["Back-Off set","ta"],["Pompaggio","ta"]]},
  {label:"W5–6 — Stress metabolico", desc:"Massima fatica metabolica, RIR 0–1. Rest-Pause su Incline Press, Lat Pulldown, Alzate laterali, Leg Curl. Vai al limite e aggiungi volume con micro-recuperi di 10-15\".", tags:[["RIR 0–1","tr"],["Rest-Pause","tr"],["Alta fatica","tp"]]},
  {label:"W7–8 — Densità alta", desc:"Volume massimo. Drop Set sugli esercizi di isolamento. Giant Set spalle con 5–6 giri totali. Massima densità: più esercizi, più giri, meno recupero.", tags:[["Drop Set","tp"],["Giant Set x5–6","tp"],["Alta densità","ta"]]}
];

const DAYS = [
  {
    name:"Day 1", full:"Torace + Tricipiti",
    exercises:[
      {num:"Mob", name:"Pre-workout", mob:true, items:[
        {name:"Band shoulder dislocazioni",sets:"3×15",yt:"band shoulder dislocations"},
        {name:"Scapular push up",sets:"3×12",yt:"scapular push up tutorial"},
        {name:"Aperture elastico petto",sets:"2×20",yt:"chest stretch resistance band"},
        {name:"Estensioni toraciche foam roller",sets:"2×10",yt:"thoracic extension foam roller"}

      {num:"1", name:"Chest Incline", summary:"4×6-8 | TUT 3-1-1", sets:"4×6-8", tut:["3","1","1"], rest:'120"', yt:"incline bench press technique",
        note:"Esercizio principale del torace. Eseguilo sempre fresco, è priorità assoluta.",
        alt:{name:"Incline Press manubri", yt:"incline dumbbell press technique"},

function getSetsCount(setsStr) {
  const m = setsStr.match(/^(\d+)/);
  return m ? parseInt(m[1]) : 3;
}

function renderSchema(type, sets) {
  const reps = (sets.match(/×(\S+)/) || ['','?'])[1];
  const nSets = getSetsCount(sets) || 3;
  if (type === 'backoff') {
    const blocks = Array.from({length: Math.min(nSets,3)}, (_,i) =>
      `<div class="schema-set"><div class="schema-set-label">Set ${i+1}</div><div class="schema-set-val">${reps}</div></div><span class="schema-arrow">→</span>`).join('');
    return `<div class="schema-wrap"><div class="schema-row">${blocks}<div class="schema-bo"><div class="schema-bo-label">Back-Off</div><div class="schema-bo-val">-20% peso<br>15-20 reps</div></div></div></div>`;
  }
  if (type === 'restpause') {
    return `<div class="schema-wrap"><div class="schema-row">
      <div class="schema-set"><div class="schema-set-label">Al limite</div><div class="schema-set-val">${reps} reps</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-pause"><div class="schema-pause-label">Pausa</div><div class="schema-pause-val">15"</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-set"><div class="schema-set-label">Riprendi</div><div class="schema-set-val">+4 reps</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-pause"><div class="schema-pause-label">Pausa</div><div class="schema-pause-val">15"</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-set"><div class="schema-set-label">Riprendi</div><div class="schema-set-val">+2 reps</div></div>
    </div></div>`;
  }
  if (type === 'dropset') {
    return `<div class="schema-wrap"><div class="schema-row">
      <div class="schema-set"><div class="schema-set-label">Al cedimento</div><div class="schema-set-val">Peso pieno</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-drop"><div class="schema-drop-label">Drop -25%</div><div class="schema-drop-val">Scala subito</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-set"><div class="schema-set-label">Continua</div><div class="schema-set-val">Nuovo ced.</div></div>
    </div></div>`;
  }
  if (type === 'isometria') {
    return `<div class="schema-wrap"><div class="schema-row">
      <div class="schema-set"><div class="schema-set-label">Fase salita</div><div class="schema-set-val">Contrai</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-bo"><div class="schema-bo-label">Isometria picco</div><div class="schema-bo-val">Tieni 2"</div></div>
      <span class="schema-arrow">→</span>
      <div class="schema-set"><div class="schema-set-label">Discesa</div><div class="schema-set-val">Controlla</div></div>
    </div></div>`;
  }
  return '';
}

// ── Session tracker ────────────────────────────────────────────
const MAX_WEEKS = 8;

function getSessions(di) {
  try { return JSON.parse(localStorage.getItem('fv_sessions_d' + di)) || []; }
  catch { return []; }
}

function todayISO() {
  return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
}

function alreadyDoneToday(di) {
  return getSessions(di).includes(todayISO());
}

function addSession(di, dateISO) {
  const sessions = getSessions(di);
  const d = dateISO || todayISO();
  if (sessions.includes(d)) return; // no duplicates on same date
  sessions.push(d);
  sessions.sort(); // keep chronological order
  localStorage.setItem('fv_sessions_d' + di, JSON.stringify(sessions));
}

function removeSession(di, idx) {
  const sessions = getSessions(di);
  sessions.splice(idx, 1);
  localStorage.setItem('fv_sessions_d' + di, JSON.stringify(sessions));
}

function editSessionDate(di, idx, newDate) {
  const sessions = getSessions(di);
  if (!newDate) return;
  if (sessions.includes(newDate) && sessions[idx] !== newDate) {
    alert('Hai già una sessione registrata in quella data.');
    return;
  }
  sessions[idx] = newDate;
  sessions.sort();
  localStorage.setItem('fv_sessions_d' + di, JSON.stringify(sessions));
  renderDay(di);
  renderNav();
}

function currentWeekLabel(di) {
  const n = getSessions(di).length;
  if (n === 0) return null;
  const wk = Math.ceil(n / 2);
  const clamp = Math.min(wk, 4);
  return ['W1–2','W3–4','W5–6','W7–8'][clamp - 1];
}

function formatDate(isoStr) {
  const d = new Date(isoStr + 'T12:00:00');
  return d.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' });
}

function daysAgo(isoStr) {
  const diff = Math.round((new Date(todayISO()) - new Date(isoStr)) / 86400000);
  if (diff === 0) return 'oggi';
  if (diff === 1) return 'ieri';
  if (diff < 0) return 'futuro';
  return diff + ' gg fa';
}

function weekLabelForIndex(n) {
  const pos = ((n - 1) % MAX_WEEKS) + 1;
  const wk = Math.ceil(pos / 2);
  return ['W1–2','W3–4','W5–6','W7–8'][wk - 1];
}

function cycleNum(n) {
  return Math.ceil(n / MAX_WEEKS);
}

function totalSessions() {
  return DAYS.reduce((s, _, i) => s + getSessions(i).length, 0);
}

function totalDone() {
  return totalSessions();
}

function globalWeekLabel() {
  const total = totalSessions();
  if (total === 0) return null;
  const wk = Math.ceil(total / 4);
  return wk;
}

function lastSessionInfo() {
  let last = null, lastDay = null;
  DAYS.forEach((d, i) => {
    const ss = getSessions(i);
    if (ss.length) {
      const latest = ss[ss.length - 1];
      if (!last || latest > last) { last = latest; lastDay = i; }
    }
  });
  if (!last) return null;
  return { date: last, day: lastDay, dayName: DAYS[lastDay].name };
}

function renderProgressBanner() {
  const wk = globalWeekLabel();
  const last = lastSessionInfo();
  const done = totalDone();
  const pct = Math.round((done / 32) * 100);

  if (!wk && !last) {
    return `<div class="prog-banner">
      <div class="prog-banner-icon">🏁</div>
      <div class="prog-banner-body">
        <div class="prog-banner-week">Nessuna sessione registrata</div>
        <div class="prog-banner-detail">Segna il completamento dopo ogni allenamento</div>
        <div class="prog-banner-bar-wrap"><div class="prog-banner-bar" style="width:0%"></div></div>
      </div>
    </div>`;
  }

  const wkDisplay = wk > 8 ? `Settimana ${wk} (ciclo ${Math.ceil(wk/8)})` : `Settimana ${wk}`;
  const WEEK_LABELS = ['W1–2 — Tensione meccanica','W3–4 — Intensificazione','W5–6 — Stress metabolico','W7–8 — Densità alta'];
  const wkLabel = WEEK_LABELS[(Math.ceil(((wk-1)%8+1)/2)) - 1];
  const pctDisplay = wk > 8 ? Math.round(((done % 32) / 32) * 100) : pct;
  const lastText = last ? `Ultima sessione: ${last.dayName} · ${daysAgo(last.date)}` : '';

  return `<div class="prog-banner">
    <div class="prog-banner-icon">${pct >= 100 && wk <= 8 ? '🏆' : '📅'}</div>
    <div class="prog-banner-body">
      <div class="prog-banner-week">${wkDisplay} · ${done} sessioni totali</div>
      <div class="prog-banner-detail">${wkLabel}</div>
      ${last ? `<div class="prog-banner-detail" style="margin-top:2px">${lastText}</div>` : ''}
      <div class="prog-banner-bar-wrap"><div class="prog-banner-bar" style="width:${pctDisplay}%"></div></div>
    </div>
  </div>`;
}

function renderCompleteSection(di) {
  const sessions = getSessions(di);
  const n = sessions.length;
  const doneToday = alreadyDoneToday(di);
  const nextLabel = `Sessione ${n+1} — ${weekLabelForIndex(n+1)}`;

  const datePickerId = `dp_${di}`;
  const btnHTML = doneToday
    ? `<button class="complete-btn already" disabled>✓ Segnato — Sessione ${n} (${weekLabelForIndex(n)})</button>
       <div class="complete-hint">Già registrato per oggi. Il pulsante riappare la prossima volta che apri un giorno diverso.</div>`
    : `<button class="complete-btn" onclick="markCompleteWithDate(${di},'${datePickerId}')">✓ Segna allenamento completato</button>
       <div class="complete-date-row">
         <span class="complete-date-label">📅 Data allenamento:</span>
         <input class="complete-date-input" type="date" id="${datePickerId}" value="${todayISO()}" max="${todayISO()}">
       </div>
       <div class="complete-hint">Prossima: <strong>${nextLabel}</strong> · Cambia la data se l'hai fatto in un giorno precedente.</div>`;

  let histHTML = '';
  if (n > 0) {
    histHTML = `<div class="complete-history-title">Storico — modifica data con ✏️ o rimuovi con 🗑</div>
      <div class="complete-history">
        ${sessions.slice().reverse().map((s, ri) => {
          const realIdx = n - 1 - ri;
          const sessionNum = n - ri;
          const editId = `ed_${di}_${realIdx}`;
          return `<div class="hist-row" id="hr_${di}_${realIdx}">
            <span class="hist-week">${weekLabelForIndex(sessionNum)}</span>
            <span class="hist-date" id="hd_${di}_${realIdx}">${formatDate(s)}</span>
            <span class="hist-ago">${daysAgo(s)}</span>
            <button class="hist-date-edit" onclick="toggleEditDate(${di},${realIdx},'${s}')" title="Modifica data">✏️</button>
            <button class="hist-del" onclick="removeSessionUI(${di},${realIdx})" title="Rimuovi">🗑</button>
          </div>
          <div id="${editId}" style="display:none; padding:6px 0 8px; border-bottom:1px solid var(--border);">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <input type="date" id="ei_${di}_${realIdx}" value="${s}" max="${todayISO()}"
                style="flex:1;min-width:130px;height:34px;border:1.5px solid var(--accent);border-radius:var(--r-sm);background:var(--card);color:var(--text);font-size:13px;padding:0 8px;outline:none;">
              <button onclick="saveEditDate(${di},${realIdx})"
                style="padding:6px 12px;background:var(--accent);color:white;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;">Salva</button>
              <button onclick="toggleEditDate(${di},${realIdx},'${s}')"
                style="padding:6px 10px;background:transparent;color:var(--text3);border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13px;cursor:pointer;">✕</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }

  return `<div class="complete-section">
    ${btnHTML}
    ${histHTML}
  </div>`;
}

function markComplete(di) {
  addSession(di);
  renderDay(di);
  renderNav();
}

function markCompleteWithDate(di, inputId) {
  const input = document.getElementById(inputId);
  const date = input ? input.value : todayISO();
  if (!date) { alert('Seleziona una data.'); return; }
  const sessions = getSessions(di);
  if (sessions.includes(date)) { alert('Hai già una sessione registrata in quella data.'); return; }
  addSession(di, date);
  renderDay(di);
  renderNav();
}

function toggleEditDate(di, idx, currentDate) {
  const editDiv = document.getElementById(`ed_${di}_${idx}`);
  if (!editDiv) return;
  const isOpen = editDiv.style.display !== 'none';
  editDiv.style.display = isOpen ? 'none' : 'block';
}

function saveEditDate(di, idx) {
  const input = document.getElementById(`ei_${di}_${idx}`);
  if (!input || !input.value) return;
  editSessionDate(di, idx, input.value);
}

function removeSessionUI(di, idx) {
  removeSession(di, idx);
  renderDay(di);
  renderNav();
}

function renderDots(di) {
  const n = getSessions(di).length;
  const doneToday = alreadyDoneToday(di);
  const pos = n % MAX_WEEKS; // position in current cycle (0-7)
  return Array.from({length: MAX_WEEKS}, (_, i) => {
    let cls = 'day-dot';
    if (n >= MAX_WEEKS) {
      // completed at least one full cycle: all dots orange except current position
      cls += i < pos ? ' today' : (i === pos && doneToday ? ' today' : ' done');
    } else {
      if (i < n) cls += (i === n - 1 && doneToday) ? ' today' : ' done';
    }
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderDay(di) {
  activeDay = di;
  document.querySelectorAll('.day-btn').forEach((b,j) => b.classList.toggle('active', j===di));
  const day = DAYS[di];
  let html = renderProgressBanner();
  html += renderWeekStrip();
  html += `<div class="day-title">${day.name}</div><div class="day-sub">${day.full}</div>`;
  html += `<div class="sec">Esercizi</div>`;
  day.exercises.forEach((ex, ei) => { html += renderExercise(ex, di, ei); });
  html += renderCompleteSection(di);
  html += `<div class="sec" style="margin-top:24px">Glossario</div>
    <div class="glossary">
      <div class="gl-row"><span class="gl-term">TUT</span><span class="gl-def">Eccentrica–Isometria–Concentrica in secondi. Es: 3-1-1 = 3" discesa / 1" pausa / 1" salita</span></div>
      <div class="gl-row"><span class="gl-term">RIR</span><span class="gl-def">Reps In Reserve — reps rimaste prima del cedimento. RIR 0 = limite assoluto</span></div>
      <div class="gl-row"><span class="gl-term">Back-Off</span><span class="gl-def">Set extra con -15/20% di carico, 15-20 reps di pompaggio subito dopo i set principali</span></div>
      <div class="gl-row"><span class="gl-term">Rest-Pause</span><span class="gl-def">Quasi al cedimento → 15" pausa → riparti. Ripeti 2-3 volte nello stesso set</span></div>
      <div class="gl-row"><span class="gl-term">Drop Set</span><span class="gl-def">Al cedimento, scala subito il peso del 20-30% e continua senza recupero</span></div>
      <div class="gl-row"><span class="gl-term">Giant Set</span><span class="gl-def">3+ esercizi in sequenza senza recupero. Recupera solo dopo il giro completo</span></div>
      <div class="gl-row"><span class="gl-term">Vacuum</span><span class="gl-def">Espira tutta l'aria, risucchia l'ombelico verso la colonna e tieni 20-30"</span></div>
    </div>`;
  document.getElementById('content').innerHTML = html;
  showWeek(activeWeek);
}

function renderNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = DAYS.map((d,i) => `
    <div class="day-btn-wrap" onclick="renderDay(${i})">
      <button class="day-btn${i===activeDay?' active':''}">${d.name}</button>
      <div class="day-dots">${renderDots(i)}</div>
    </div>`).join('');
}

// ── Installazione come App ──────────────────────────────────────
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

function showInstallInfo() {
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; });
  } else {
    alert(
      'Per usare come app sul telefono:\n\n' +
      '1. Apri questo file in Google Chrome\n' +
      '2. Tocca i tre puntini (menu ⋮) in alto a destra\n' +
      '3. Seleziona "Aggiungi a schermata Home"\n' +
      '4. Conferma: appare un icona sul desktop!\n\n' +
      'Consiglio: carica il file su GitHub Pages o Google Drive per aprirlo sempre dallo stesso link.'
    );
  }
}

})();
